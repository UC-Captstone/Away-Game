<div class="h-[calc(100dvh-4rem)] flex items-start justify-center text-center bg-linear-to-b from-slate-800 to-slate-900 overflow-hidden">
  @if (isLoading()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div class="flex flex-col items-center gap-3">
        <svg
          class="animate-spin h-12 w-12 text-sky-400"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
          ></path>
        </svg>
        <span class="text-sm font-medium text-slate-300">Loading map...</span>
      </div>
    </div>
  }

  <div class="bg-transparent w-full px-4 sm:px-6 py-4 sm:py-6 flex flex-col overflow-hidden max-w-screen-2xl mx-auto min-h-0">
    <app-map-header
      [showGameOverlay]="showGameOverlay()"
      [showEventOverlay]="showEventOverlay()"
      [showSafetyOverlay]="showSafetyOverlay()"
      [showUserMarker]="showUserMarker()"
      (toggleGameOverlay)="onToggleGameOverlay()"
      (toggleEventOverlay)="onToggleEventOverlay()"
      (toggleSafetyOverlay)="onToggleSafetyOverlay()"
      (toggleUserMarker)="onToggleUserMarker()"
    ></app-map-header>

    @if (locationNotice(); as notice) {
      <div class="mt-3 rounded-xl border border-amber-500/40 bg-amber-500/10 text-amber-100 text-left px-3 py-2 text-xs sm:text-sm">
        {{ notice }}
      </div>
    }

    <div class="mt-4 min-h-0 flex-1 grid grid-cols-1 xl:grid-cols-[minmax(0,1fr)_24rem] gap-6 xl:h-full">
      <div
        class="w-full h-full min-h-[20rem] sm:min-h-[26rem] xl:min-h-0 bg-slate-900 border border-slate-700 rounded-3xl shadow-lg backdrop-blur-md overflow-hidden flex flex-col"
      >
        <div
          class="p-4 border-b border-slate-800 text-left text-xs text-slate-300 flex items-center justify-between"
        >
          <span>Map Layers: {{ mapMarkers().length }} markers</span>
          <span>Search Radius: 100 mi</span>
        </div>

        <div class="flex-1 min-h-[18rem] xl:min-h-0">
          <app-map
            [center]="userLocation()"
            [zoom]="11"
            [events]="mapMarkers()"
            [height]="'100%'"
            [showUserMarker]="showUserMarker()"
            [fitBoundsToMarkers]="false"
            [fillContainer]="true"
            (viewportChanged)="onViewportChanged($event)"
          ></app-map>
        </div>
      </div>

      <app-map-sidebar
        class="h-full min-h-[20rem] sm:min-h-[24rem] xl:min-h-0"
        [visibleEvents]="visibleEvents()"
        (openEventDetails)="openEventDetails($event)"
      ></app-map-sidebar>
    </div>
  </div>
</div>
