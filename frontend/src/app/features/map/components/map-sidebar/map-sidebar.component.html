<div
  class="w-full h-full bg-slate-900 border border-slate-700 rounded-3xl shadow-lg backdrop-blur-md overflow-hidden flex flex-col min-h-0"
>
  <div class="p-4 border-b border-slate-800 text-left">
    <h2 class="text-base font-semibold text-slate-100">Events In View</h2>
    <p class="mt-1 text-xs text-slate-400">
      {{ visibleEvents.length }} events visible in current map bounds.
    </p>
  </div>

  <div class="p-3 flex-1 min-h-0 overflow-visible xl:overflow-auto xl:max-h-[calc(100dvh-16rem)] text-left">
    <div class="space-y-2">
      @for (event of visibleEvents; track event.eventId) {
        <button
          type="button"
          (click)="onOpenEventDetails(event)"
          class="w-full rounded-xl border border-slate-800 bg-slate-950/40 p-3 hover:bg-slate-800/70 transition-colors text-left"
        >
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="text-sm font-medium text-slate-100 truncate">{{ event.eventName }}</p>
              <p class="mt-1 text-xs text-slate-400 truncate">{{ event.venueName }}</p>
              <p class="mt-1 text-xs text-slate-400">{{ event.dateTime | date: 'short' }}</p>
            </div>
            <span
              class="text-[10px] px-2 py-1 rounded-full bg-slate-800 border border-slate-700 text-slate-300"
            >
              {{ event.eventType }}
            </span>
          </div>
        </button>
      } @empty {
        <div class="text-center text-sm text-slate-400 py-10">No events in current map view.</div>
      }
    </div>
  </div>
</div>
