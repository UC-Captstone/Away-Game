<div
  class="w-full bg-slate-900 border border-slate-700 rounded-3xl shadow-lg backdrop-blur-md px-4 py-3"
>
  <div class="flex flex-wrap items-center justify-between gap-3 text-left">
    <div>
      <h1 class="text-lg md:text-xl font-semibold text-slate-100">Map Explorer</h1>
      <p class="text-xs text-slate-400 mt-1">
        Browse events, safety alerts, and nearby places around your stored location.
      </p>
    </div>

    <div class="flex flex-wrap items-center gap-2 sm:gap-3 text-xs text-slate-300">
      <label
        class="inline-flex items-center gap-2 cursor-pointer rounded-lg px-2 py-2 hover:bg-slate-800/60 transition-colors min-h-10"
      >
        <input
          type="checkbox"
          [checked]="showGameOverlay"
          (change)="onToggleGameOverlay()"
          class="accent-amber-500"
        />
        Games
      </label>

      <label
        class="inline-flex items-center gap-2 cursor-pointer rounded-lg px-2 py-2 hover:bg-slate-800/60 transition-colors min-h-10"
      >
        <input
          type="checkbox"
          [checked]="showEventOverlay"
          (change)="onToggleEventOverlay()"
          class="accent-emerald-500"
        />
        Events
      </label>

      <label
        class="inline-flex items-center gap-2 cursor-pointer rounded-lg px-2 py-2 hover:bg-slate-800/60 transition-colors min-h-10"
      >
        <input
          type="checkbox"
          [checked]="showSafetyOverlay"
          (change)="onToggleSafetyOverlay()"
          class="accent-red-500"
        />
        Safety Alerts
      </label>

      <label
        class="inline-flex items-center gap-2 cursor-pointer rounded-lg px-2 py-2 hover:bg-slate-800/60 transition-colors min-h-10"
      >
        <input
          type="checkbox"
          [checked]="placeCategoryFilters.restaurant"
          (change)="onTogglePlaceCategory('restaurant')"
          class="accent-yellow-300"
        />
        Restaurants
      </label>

      <label
        class="inline-flex items-center gap-2 cursor-pointer rounded-lg px-2 py-2 hover:bg-slate-800/60 transition-colors min-h-10"
      >
        <input
          type="checkbox"
          [checked]="placeCategoryFilters.bar"
          (change)="onTogglePlaceCategory('bar')"
          class="accent-violet-600"
        />
        Bars
      </label>

      <label
        class="inline-flex items-center gap-2 cursor-pointer rounded-lg px-2 py-2 hover:bg-slate-800/60 transition-colors min-h-10"
      >
        <input
          type="checkbox"
          [checked]="placeCategoryFilters.hotel"
          (change)="onTogglePlaceCategory('hotel')"
          class="accent-cyan-500"
        />
        Hotels
      </label>
    </div>
  </div>
</div>
