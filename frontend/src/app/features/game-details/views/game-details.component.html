<div
  class="min-h-[calc(100dvh-4rem)] xl:h-[calc(100dvh-4rem)] flex items-start justify-center text-center bg-linear-to-b from-slate-800 to-slate-900 overflow-y-auto xl:overflow-hidden"
>
  @if (isLoading()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div class="flex flex-col items-center gap-3">
        <svg
          class="animate-spin h-12 w-12 text-sky-400"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
          ></path>
        </svg>
        <span class="text-sm font-medium text-slate-300">Loading game details…</span>
      </div>
    </div>
  }

  <div
    class="bg-transparent w-full px-4 sm:px-6 py-4 sm:py-6 flex flex-col overflow-visible xl:overflow-hidden max-w-screen-2xl mx-auto min-h-0"
  >
    <app-details-header [event]="game()"></app-details-header>

    <div
      class="mt-4 min-h-0 flex-1 grid grid-cols-1 xl:grid-cols-2 gap-4 sm:gap-6 xl:h-[calc(100dvh-13rem)] xl:items-stretch xl:grid-rows-[minmax(0,1fr)] xl:overflow-hidden"
    >
      <div
        class="h-[70dvh] sm:h-[68dvh] md:h-[34rem] max-h-[40rem] xl:h-[calc(100dvh-13rem)] xl:max-h-none min-h-[20rem] sm:min-h-[24rem] xl:min-h-0 flex overflow-hidden"
      >
        <app-game-details-panel
          class="w-full h-full"
          [eventId]="chatEventId()"
          [gameId]="game()?.gameId"
          [gameEvents]="gameEvents()"
          [safetyAlerts]="safetyAlerts()"
          (addEventClicked)="onAddEventClicked()"
          (addAlertClicked)="onAddAlertClicked()"
        ></app-game-details-panel>
      </div>

      <div
        class="h-[48dvh] sm:h-[52dvh] md:h-[28rem] max-h-[32rem] xl:h-[calc(100dvh-13rem)] xl:max-h-none min-h-[16rem] sm:min-h-[20rem] xl:min-h-0 flex overflow-hidden"
      >
        <app-game-map-panel
          class="w-full h-full"
          [game]="game()"
          [gameEvents]="gameEvents()"
          [safetyAlerts]="safetyAlerts()"
          [center]="game()?.location ?? { lat: 39.8283, lng: -98.5795 }"
        ></app-game-map-panel>
      </div>
    </div>
  </div>

  <app-popup-modal
    [open]="showAddEventModal()"
    (closed)="onAddEventCancelled()"
    title="Add Event"
    size="lg"
  >
    @if (game()?.gameId != null) {
      <app-add-event-form
        [gameId]="game()?.gameId ?? 0"
        [gameDateTime]="game()?.dateTime ?? null"
        [initialCenter]="game()?.location ?? { lat: 39.8283, lng: -98.5795 }"
        [isSubmitting]="isEventSubmitting()"
        [errorMessage]="addEventErrorMessage()"
        (submitted)="onEventSubmitted($event)"
        (cancelled)="onAddEventCancelled()"
      ></app-add-event-form>
    } @else {
      <div class="px-3 py-2 rounded-lg bg-red-500/20 border border-red-500/40 text-red-300 text-sm">
        A game id is required before creating an event.
      </div>
    }
  </app-popup-modal>

  <app-popup-modal
    [open]="showAddAlertModal()"
    (closed)="onAddAlertCancelled()"
    title="Add Alert"
    size="lg"
  >
    @if (game()?.gameId != null) {
      <app-alert-form
        [gameId]="game()?.gameId ?? 0"
        [initialCenter]="game()?.location ?? { lat: 39.8283, lng: -98.5795 }"
        [isAdmin]="isAdmin"
        (alertCreated)="onAlertCreated()"
        (cancelled)="onAddAlertCancelled()"
      ></app-alert-form>
    } @else {
      <div class="px-3 py-2 rounded-lg bg-red-500/20 border border-red-500/40 text-red-300 text-sm">
        A game id is required before creating an alert.
      </div>
    }
  </app-popup-modal>
</div>
