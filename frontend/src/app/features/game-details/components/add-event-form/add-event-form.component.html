<div class="bg-slate-800 border border-slate-700 rounded-xl p-4">
  <h3 class="text-sm font-semibold text-slate-200 mb-4">New Event</h3>

  @if (errorMessage) {
    <div
      class="mb-3 px-3 py-2 rounded-lg bg-red-500/20 border border-red-500/40 text-red-300 text-xs"
    >
      {{ errorMessage }}
    </div>
  }

  <form (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1"
        >Title <span class="text-red-400">*</span></label
      >
      <input
        type="text"
        [(ngModel)]="title"
        name="title"
        required
        placeholder="Event title"
        class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-200 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
      />
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1"
        >Event Type <span class="text-red-400">*</span></label
      >
      <select
        [(ngModel)]="eventType"
        name="eventType"
        required
        class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
      >
        @for (eventType of eventTypeOptions; track eventType) {
          <option [ngValue]="eventType">{{ eventType }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1"
        >Time <span class="text-red-400">*</span></label
      >
      <input
        type="time"
        [(ngModel)]="selectedTime"
        name="selectedTime"
        required
        class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent"
      />
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1">Description</label>
      <textarea
        [(ngModel)]="description"
        name="description"
        rows="3"
        placeholder="Optional event details"
        class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-200 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent resize-none"
      ></textarea>
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-400 mb-1"
        >Event Location <span class="text-red-400">*</span></label
      >
      <p class="text-xs text-slate-500 mb-2">Click on the map to set event coordinates.</p>
      <app-map
        [center]="mapCenter"
        [zoom]="13"
        [events]="selectionMarker"
        [height]="'220px'"
        [showUserMarker]="false"
        [fitBoundsToMarkers]="false"
        (mapClicked)="onMapClicked($event)"
      ></app-map>
      <div class="mt-2 text-[11px] text-slate-400">
        Lat: {{ selectedLocation.lat | number: '1.5-5' }} | Lng:
        {{ selectedLocation.lng | number: '1.5-5' }}
      </div>
    </div>

    <div class="flex gap-2 pt-1">
      <button
        type="submit"
        [disabled]="isSubmitting || !title.trim() || !selectedTime"
        class="flex-1 py-2 rounded-lg bg-sky-500 text-white text-xs font-medium hover:bg-sky-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ isSubmitting ? 'Submitting...' : 'Submit Event' }}
      </button>
      <button
        type="button"
        (click)="onCancel()"
        class="flex-1 py-2 rounded-lg bg-slate-700 text-slate-300 text-xs font-medium hover:bg-slate-600 transition-colors"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
