<div class="group flex items-center gap-3 w-full" [class.flex-row-reverse]="isOwnMessage">
  @if (message.userAvatarUrl) {
    <img
      [src]="message.userAvatarUrl"
      [alt]="message.userName ?? 'User'"
      class="h-8 w-8 rounded-full object-cover ring-1 ring-slate-600 shrink-0"
    />
  } @else {
    <div
      class="h-8 w-8 rounded-full bg-sky-600 flex items-center justify-center text-white text-xs font-semibold shrink-0 ring-1 ring-slate-600"
    >
      {{ getInitials(message.userName) }}
    </div>
  }

  <div class="flex flex-col min-w-0 flex-1">
    <div class="flex items-center gap-2 mb-0.5 w-full" [class.justify-end]="isOwnMessage">
      @if (isOwnMessage) {
        <button
          type="button"
          (click)="onDelete()"
          [disabled]="deleting"
          title="Delete message"
          class="opacity-0 group-hover:opacity-100 shrink-0 p-1 rounded-lg text-slate-500 hover:text-red-400 hover:bg-red-900/30 disabled:opacity-30 disabled:cursor-not-allowed transition-all duration-150"
        >
          @if (deleting) {
            <svg
              class="animate-spin h-3.5 w-3.5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
              ></path>
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-3.5 w-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
              <path d="M10 11v6M14 11v6"></path>
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
            </svg>
          }
        </button>

        <span class="text-[10px] text-slate-500 shrink-0">
          {{ formatTime(message.timestamp) }}
        </span>
        <span class="text-xs font-semibold text-slate-200 truncate">
          {{ message.userName ?? 'Anonymous' }}
        </span>
      } @else {
        <span class="text-xs font-semibold text-slate-200 truncate">
          {{ message.userName ?? 'Anonymous' }}
        </span>
        <span class="text-[10px] text-slate-500 shrink-0">
          {{ formatTime(message.timestamp) }}
        </span>
      }
    </div>
    <div class="flex w-full">
      <div
        class="border rounded-2xl px-3 py-2 text-sm wrap-break-word leading-relaxed w-full"
        [ngClass]="
          isOwnMessage
            ? 'rounded-tr-sm bg-sky-900/45 border-sky-700/70 text-slate-100'
            : 'rounded-tl-sm bg-slate-800 border-slate-700 text-slate-200'
        "
      >
        {{ message.messageText }}
      </div>
    </div>
  </div>
</div>
