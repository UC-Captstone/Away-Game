<div
  class="min-h-[calc(100dvh-4rem)] xl:h-[calc(100dvh-4rem)] flex items-start justify-center text-center bg-linear-to-b from-slate-800 to-slate-900 overflow-y-auto xl:overflow-hidden"
>
  @if (isLoading()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
      <div class="flex flex-col items-center gap-3">
        <svg
          class="animate-spin h-12 w-12 text-sky-400"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
          ></path>
        </svg>
        <span class="text-sm font-medium text-slate-300">Loading…</span>
      </div>
    </div>
  }
  <div class="bg-transparent w-full px-4 sm:px-6 py-4 sm:py-6 flex flex-col overflow-visible xl:overflow-hidden max-w-screen-2xl mx-auto min-h-0">
    <div class="mt-3 flex-1 min-h-0">
      <div class="w-full h-auto xl:h-full bg-slate-900 border border-slate-700 rounded-3xl shadow-lg backdrop-blur-md overflow-hidden flex flex-col min-h-0">
        <div class="flex flex-col xl:flex-row h-auto xl:h-full min-h-0">
          <div class="shrink-0 xl:w-[23rem] xl:h-full">
            <app-event-filters-panel
              [initialFilters]="initialPanelFilters"
              [initialSportsFilterMode]="initialSportsFilterMode"
              [initialSelectedTeams]="initialSelectedTeams"
              (applyFilters)="onApplyFilters($event)"
            ></app-event-filters-panel>
          </div>

          <div
            class="content-panel pt-3 px-3 text-slate-300 w-full h-auto xl:h-full flex-1 bg-transparent flex flex-col min-h-0"
          >
            <div class="flex items-center justify-center mb-4 px-1 shrink-0">
              <h1
                class="text-3xl sm:text-4xl font-extrabold tracking-wide text-slate-100 drop-shadow-[0_4px_12px_rgba(15,23,42,0.55)]"
              >
                Events
              </h1>
            </div>

            <app-event-result-grid class="flex-1 min-h-0" [events]="events()"></app-event-result-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
