<div
  class="tabs-panel bg-transparent w-full md:w-92.5 p-4 border-r border-slate-800 overflow-y-auto"
  style="min-height: 0"
>
  <div class="flex flex-col h-full">
    <div class="mb-4 flex items-center justify-between">
      <h1 class="text-white text-lg font-semibold">Event Filters</h1>
      <button
        type="button"
        (click)="onApplyFilters()"
        [disabled]="!hasFilterChanges()"
        class="bg-sky-500 hover:bg-sky-600 disabled:bg-slate-700 disabled:text-slate-400 disabled:cursor-not-allowed text-white text-xs font-medium py-1 px-3 rounded-lg transition-colors"
      >
        Apply
      </button>
    </div>

    <div class="space-y-4 text-left">
      <div class="rounded-lg border border-slate-700/80 p-2">
        <app-event-search-filter [(keyword)]="keyword"></app-event-search-filter>
      </div>

      <div class="rounded-lg border border-slate-700/80 p-2">
        <label class="block mb-1.5 text-xs font-medium text-white">Sports Filter</label>
        <div
          class="relative mb-2 rounded-lg bg-slate-800 border border-slate-700 p-1 grid grid-cols-2"
        >
          <div
            class="absolute top-1 bottom-1 w-[calc(50%-0.25rem)] rounded-md bg-sky-500 transition-transform duration-200"
            [ngClass]="sportsFilterMode === 'team' ? 'translate-x-full' : 'translate-x-0'"
          ></div>

          <button
            type="button"
            (click)="onSportsFilterModeChange('league')"
            class="relative z-10 text-xs py-1 rounded-md transition-colors"
            [ngClass]="sportsFilterMode === 'league' ? 'text-white font-medium' : 'text-slate-300'"
          >
            Sports League
          </button>

          <button
            type="button"
            (click)="onSportsFilterModeChange('team')"
            class="relative z-10 text-xs py-1 rounded-md transition-colors"
            [ngClass]="sportsFilterMode === 'team' ? 'text-white font-medium' : 'text-slate-300'"
          >
            Team
          </button>
        </div>

        @if (sportsFilterMode === 'league') {
          <app-league-selection-filter
            [(selectedLeagues)]="selectedLeagues"
          ></app-league-selection-filter>
        } @else {
          <div class="py-1.25">
            <app-team-selector
              [multi]="true"
              [selectedTeams]="selectedTeams"
              [dropdownLimit]="10"
              [isNonFavorite]="true"
              [compactSelectors]="true"
              (teamsSelected)="onTeamsSelected($event)"
            ></app-team-selector>
          </div>
        }
      </div>

      <div class="rounded-lg border border-slate-700/80 p-2">
        <app-date-range-filter
          [(startDate)]="startDate"
          [(endDate)]="endDate"
        ></app-date-range-filter>
      </div>

      <div class="rounded-lg border border-slate-700/80 p-2">
        <app-location-filter [(locationQuery)]="locationQuery"></app-location-filter>
      </div>

      <div class="rounded-lg border border-slate-700/80 p-2">
        <app-saved-only-filter [(savedOnly)]="savedOnly"></app-saved-only-filter>
      </div>

      <div class="rounded-lg border border-slate-700/80 p-2">
        <app-event-type-filter [(selectedEventTypes)]="selectedEventTypes"></app-event-type-filter>
      </div>
    </div>
  </div>
</div>
