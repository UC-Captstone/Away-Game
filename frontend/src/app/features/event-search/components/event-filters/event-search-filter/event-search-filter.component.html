<label class="block mb-1.5 text-xs font-medium text-white">Search Events</label>
<input
  [ngModel]="keyword"
  (ngModelChange)="keywordChange.emit($event)"
  name="keyword"
  type="text"
  class="bg-slate-700 border border-slate-600 text-white placeholder-slate-400 text-sm rounded-lg focus:ring-sky-500 focus:border-sky-500 block w-full px-3 py-2.5 min-h-11"
  placeholder="Search by event name or keyword"
/>
