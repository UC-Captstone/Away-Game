<div class="min-h-[calc(100dvh-4rem)] bg-slate-900 flex flex-col lg:flex-row overflow-hidden">
  <!-- Left Panel: Friends -->
  <div
    class="flex flex-col border-b lg:border-b-0 lg:border-r border-slate-700 bg-slate-800 overflow-y-auto min-h-0 w-full lg:w-80"
    [ngClass]="{
      hidden: selectedFriend() && isMobile,
      'flex-shrink-0': !isMobile,
      'w-full': isMobile,
    }"
  >
    <div class="p-4 overflow-y-auto flex-1">
      <app-friends-management
        [selectedFriendId]="selectedFriend()?.friendUserId ?? null"
        (selectedFriendChange)="onFriendSelected($event)"
      ></app-friends-management>
    </div>
  </div>

  <!-- Right Panel: DM Chat -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden min-h-[32rem] lg:min-h-0">
    @if (selectedFriend()) {
      <app-dm-chat
        [otherUserId]="selectedFriend()!.friendUserId"
        [otherUsername]="selectedFriend()!.friendUsername"
        [otherAvatarUrl]="selectedFriend()!.friendAvatarUrl ?? null"
        (backClicked)="selectedFriend.set(null)"
      ></app-dm-chat>
    } @else {
      <div class="flex h-full items-center justify-center text-slate-400">
        <div class="text-center">
          <p class="text-4xl mb-3">💬</p>
          <p class="text-base font-medium mb-1 text-slate-300">Select a friend to chat</p>
          <p class="text-sm">Add friends on the left and click one to open a conversation</p>
        </div>
      </div>
    }
  </div>
</div>
