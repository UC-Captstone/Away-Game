<button
  type="button"
  (click)="onBellClick()"
  class="relative flex items-center justify-center w-10 h-10 rounded-full text-slate-300 hover:bg-slate-800/70 transition-colors"
>
  <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
    />
  </svg>
  @if (unacknowledgedCount > 0) {
    <span
      class="absolute -top-0.5 -right-0.5 flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-bold text-white bg-red-500 rounded-full"
    >
      {{ unacknowledgedCount > 99 ? '99+' : unacknowledgedCount }}
    </span>
  }
</button>
