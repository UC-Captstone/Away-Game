<article
	class="bg-slate-900 border-4 border-slate-700 rounded-lg overflow-hidden shadow-lg text-slate-300 w-64 h-64 flex flex-col"
>
	<div class="h-1/2 bg-slate-800 p-3 flex flex-col justify-between text-left">
		<div class="flex items-center justify-between">
			<span class="text-xs text-slate-400">Safety Alert</span>
			<span
				class="text-[10px] px-2 py-1 rounded-full border"
				[ngClass]="
					alert.severity === 'High'
						? 'bg-red-500/15 text-red-300 border-red-500/30'
						: alert.severity === 'Medium'
							? 'bg-amber-500/15 text-amber-300 border-amber-500/30'
							: 'bg-emerald-500/15 text-emerald-300 border-emerald-500/30'
				"
				>{{ alert.severity }}</span
			>
		</div>
		<h4 class="text-sky-400 text-base font-semibold line-clamp-2">{{ alert.title }}</h4>
	</div>
	<div class="p-3 flex-1 flex flex-col justify-between text-left">
		<p class="text-xs text-slate-300 line-clamp-3">{{ alert.description }}</p>
		<div class="pt-2 text-[11px] text-slate-400">
			<p>{{ alert.dateTime | date: 'short' }}</p>
			<p>{{ alert.location.lat | number: '1.2-2' }}, {{ alert.location.lng | number: '1.2-2' }}</p>
		</div>
	</div>
</article>
