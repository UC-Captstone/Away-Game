<article
	class="bg-slate-900 rounded-lg overflow-hidden shadow-lg text-slate-300 w-64 h-64 flex flex-col"
	[ngClass]="alert.isOfficial
		? 'border-2 border-amber-400/60 ring-1 ring-amber-400/20'
		: 'border-4 border-slate-700'"
>
	<div class="h-1/2 bg-slate-800 p-3 flex flex-col justify-between text-left">
		<div class="flex items-center justify-between gap-1">
			<div class="flex items-center gap-1.5 min-w-0">
				@if (alert.isOfficial) {
					<span class="shrink-0 px-1.5 py-0.5 rounded text-[10px] font-bold bg-amber-500/20 text-amber-300 border border-amber-500/30">
						OFFICIAL
					</span>
				}
				<span class="text-xs text-slate-400 truncate capitalize">{{ alert.alertTypeId }}</span>
			</div>
			<span
				class="shrink-0 text-[10px] px-2 py-1 rounded-full border capitalize"
				[ngClass]="
					alert.severity === 'high'
						? 'bg-red-500/15 text-red-300 border-red-500/30'
						: alert.severity === 'medium'
							? 'bg-amber-500/15 text-amber-300 border-amber-500/30'
							: 'bg-emerald-500/15 text-emerald-300 border-emerald-500/30'
				"
				>{{ alert.severity }}</span
			>
		</div>
		<h4 class="text-sky-400 text-base font-semibold line-clamp-2">{{ alert.title }}</h4>
	</div>
	<div class="p-3 flex-1 flex flex-col justify-between text-left">
		<p class="text-xs text-slate-300 line-clamp-3">{{ alert.description }}</p>
		<div class="pt-2 text-[11px] text-slate-400 flex items-center justify-between">
			<span>{{ alert.isOfficial ? 'Away Game' : (alert.source === 'admin' ? 'Admin' : 'Community') }}</span>
			<span>{{ alert.createdAt | date: 'M/d h:mm a' }}</span>
		</div>
	</div>
</article>
