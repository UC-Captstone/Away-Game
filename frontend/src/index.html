<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Away Game</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="application-name" content="Away Game">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Away Game">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- Pre-warm the connection to Clerk so DNS + TCP + TLS are already
       resolved before Clerk makes its first /v1/environment and /tokens
       requests. Saves ~50-100 ms off every Clerk network call. -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://comic-ladybug-73.clerk.accounts.dev" crossorigin>
  <link rel="dns-prefetch" href="https://comic-ladybug-73.clerk.accounts.dev">

  <!-- Preload the Clerk browser bundle so the browser starts fetching it
       in parallel with the Angular bundle rather than discovering it late. -->
  <link rel="preload" href="https://comic-ladybug-73.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        as="script" crossorigin>
</head>
<body>
  <app-root></app-root>
</body>
</html>
